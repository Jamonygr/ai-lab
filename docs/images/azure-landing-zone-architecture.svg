  <text x="44" y="48" class="title">AI Lab Azure Landing-Zone View</text>
  <text x="46" y="76" class="sub">Instructor-ready architecture: Terraform deploys a small Azure AI lab and learners run Python exercises.</text>
  <text x="46" y="98" class="sub">Optional tracks add RAG, documents, Foundry, app hosting, and hardening.</text>

