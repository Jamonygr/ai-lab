<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Instructor delivery flow</title>
  <desc id="desc">A teaching flow for preparing, deploying, running exercises, collecting evidence, reviewing, and tearing down the AI Lab.</desc>
  <defs>
    <style>
      .bg{fill:#fbfdff}.title{font:700 30px Segoe UI,Arial,sans-serif;fill:#0f172a}.sub{font:15px Segoe UI,Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke:#9ec9ea;stroke-width:1.5}.head{font:700 16px Segoe UI,Arial,sans-serif;fill:#0f172a}.t{font:12.5px Segoe UI,Arial,sans-serif;fill:#334155}.tiny{font:11px Segoe UI,Arial,sans-serif;fill:#475569}.num{font:700 15px Segoe UI,Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:central}.arrow{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0 0 10 5 0 10Z" fill="#64748b"/></marker>
    <symbol id="prep" viewBox="0 0 44 44"><rect x="8" y="7" width="28" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><path d="M15 17h14M15 23h14M15 29h8" stroke="#2563eb" stroke-width="2"/></symbol>
    <symbol id="deploy" viewBox="0 0 44 44"><path d="M8 9h28v26H8z" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><path d="M14 15l8 4v10l-8-4V15ZM24 20l8-4v10l-8 4V20Z" fill="#7c3aed"/></symbol>
    <symbol id="test" viewBox="0 0 44 44"><circle cx="22" cy="22" r="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><path d="m14 22 6 6 11-13" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="teach" viewBox="0 0 44 44"><circle cx="17" cy="16" r="6" fill="#22c55e"/><path d="M7 36c2-9 18-9 20 0" fill="#22c55e"/><rect x="25" y="11" width="13" height="18" rx="2" fill="#38bdf8"/><path d="M28 17h7M28 22h7" stroke="#fff" stroke-width="2"/></symbol>
    <symbol id="evidence" viewBox="0 0 44 44"><path d="M12 6h15l7 7v25H12V6Z" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><path d="M27 6v8h7" fill="#fff7ed"/><path d="M17 21h12M17 27h12M17 33h7" stroke="#d97706" stroke-width="2"/></symbol>
    <symbol id="review" viewBox="0 0 44 44"><rect x="7" y="9" width="30" height="23" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><path d="M14 23h10M14 17h16M27 28l3 3 6-8" stroke="#0284c7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="destroy" viewBox="0 0 44 44"><path d="M14 13h16l-2 24H16l-2-24Z" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><path d="M11 13h22M18 13V9h8v4M19 19v12M25 19v12" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/></symbol>
  </defs>
  <rect width="1200" height="520" class="bg"/>
  <text x="44" y="50" class="title">Instructor Delivery Flow</text>
  <text x="46" y="80" class="sub">Use this sequence for a clean class run: prepare, deploy, test, teach, collect evidence, review, and tear down.</text>
  <path class="arrow" d="M184 244H244"/><path class="arrow" d="M384 244H444"/><path class="arrow" d="M584 244H644"/><path class="arrow" d="M784 244H844"/><path class="arrow" d="M984 244H1044"/>

  <rect x="54" y="142" width="130" height="204" rx="10" class="card"/><circle cx="76" cy="164" r="14" fill="#2563eb"/><text x="76" y="164" class="num">1</text><use href="#prep" x="94" y="178" width="50" height="50"/><text x="84" y="256" class="head">Prepare</text><text x="78" y="286" class="t">Subscription</text><text x="78" y="306" class="t">Azure CLI</text><text x="78" y="326" class="t">Terraform vars</text>
  <rect x="254" y="142" width="130" height="204" rx="10" class="card"/><circle cx="276" cy="164" r="14" fill="#7c3aed"/><text x="276" y="164" class="num">2</text><use href="#deploy" x="294" y="178" width="50" height="50"/><text x="286" y="256" class="head">Deploy</text><text x="278" y="286" class="t">terraform init</text><text x="278" y="306" class="t">plan</text><text x="278" y="326" class="t">apply defaults</text>
  <rect x="454" y="142" width="130" height="204" rx="10" class="card"/><circle cx="476" cy="164" r="14" fill="#16a34a"/><text x="476" y="164" class="num">3</text><use href="#test" x="494" y="178" width="50" height="50"/><text x="488" y="256" class="head">Smoke test</text><text x="478" y="286" class="t">Outputs to .env</text><text x="478" y="306" class="t">00 setup</text><text x="478" y="326" class="t">01 sentiment</text>
  <rect x="654" y="142" width="130" height="204" rx="10" class="card"/><circle cx="676" cy="164" r="14" fill="#0ea5e9"/><text x="676" y="164" class="num">4</text><use href="#teach" x="694" y="178" width="50" height="50"/><text x="690" y="256" class="head">Teach labs</text><text x="678" y="286" class="t">AI basics</text><text x="678" y="306" class="t">Safety review</text><text x="678" y="326" class="t">Optional tracks</text>
  <rect x="854" y="142" width="130" height="204" rx="10" class="card"/><circle cx="876" cy="164" r="14" fill="#d97706"/><text x="876" y="164" class="num">5</text><use href="#evidence" x="894" y="178" width="50" height="50"/><text x="888" y="256" class="head">Evidence</text><text x="878" y="286" class="t">Portal shots</text><text x="878" y="306" class="t">Script output</text><text x="878" y="326" class="t">Workbook notes</text>
  <rect x="1054" y="142" width="130" height="204" rx="10" class="card"/><circle cx="1076" cy="164" r="14" fill="#dc2626"/><text x="1076" y="164" class="num">6</text><use href="#destroy" x="1094" y="178" width="50" height="50"/><text x="1094" y="256" class="head">Teardown</text><text x="1078" y="286" class="t">Review</text><text x="1078" y="306" class="t">Destroy</text><text x="1078" y="326" class="t">Verify deletion</text>

  <rect x="170" y="392" width="860" height="58" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <use href="#review" x="194" y="402" width="34" height="34"/>
  <text x="244" y="419" class="head">Instructor note</text>
  <text x="244" y="440" class="tiny">Keep the default service set for the first session. Enable RAG, documents, Foundry, OpenAI, app hosting, or private endpoints only when the matching lesson needs them.</text>
</svg>
